version: '3.8'

services:

  postgres:
    image: postgres:15
    container_name: tickets-postgres
    restart: always
    environment:
      POSTGRES_DB: tickets_db
      POSTGRES_USER: usuario
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3-management
    container_name: tickets-rabbitmq
    restart: always
    ports:
      - "5672:5672"    # comunicación app
      - "15672:15672"  # panel web
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

volumes:
  postgres_data: